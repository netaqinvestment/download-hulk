<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; background: #0f0f1a; color: #f0f0f5; font-family: 'Segoe UI', sans-serif; }
    .header { padding: 16px; background: linear-gradient(135deg, #a855f7, #06b6d4); text-align: center; }
    .header h1 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .header p { font-size: 11px; opacity: 0.85; }
    .content { padding: 16px; }
    .url-display { padding: 10px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; margin-bottom: 12px; font-size: 12px; color: #8888a0; word-break: break-all; max-height: 60px; overflow: hidden; }
    .url-display.has-url { color: #f0f0f5; }
    .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; box-shadow: 0 4px 12px rgba(168,85,247,0.3); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(168,85,247,0.4); }
    .btn-secondary { background: rgba(255,255,255,0.06); color: #8888a0; margin-top: 8px; }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #f0f0f5; }
    .status { text-align: center; padding: 8px; font-size: 11px; color: #10b981; margin-top: 8px; display: none; }
    .status.visible { display: block; }
    .server-input { display: flex; gap: 6px; margin-bottom: 12px; }
    .server-input input { flex: 1; padding: 8px 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #f0f0f5; font-size: 12px; outline: none; }
    .server-input input:focus { border-color: #a855f7; }
    .server-label { font-size: 11px; color: #55556a; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ Download Hulk</h1>
    <p>Video Downloader</p>
  </div>
  <div class="content">
    <div class="server-label">Server URL</div>
    <div class="server-input">
      <input type="text" id="serverUrl" value="http://localhost:4000" placeholder="http://localhost:4000">
    </div>
    <div class="url-display" id="currentUrl">Detecting page URL...</div>
    <button class="btn btn-primary" id="sendBtn">Send to Download Hulk</button>
    <a class="btn btn-secondary" id="openApp" href="http://localhost:4000" target="_blank">Open Download Hulk</a>
    <div class="status" id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
